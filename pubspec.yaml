name: camocam
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  animated_bottom_navigation_bar: ^1.3.3
  image_picker: ^1.0.7
  multiple_image_camera: ^0.0.2
  dotted_border: ^2.1.0
  path_provider: ^2.1.2
  model_viewer_plus: ^1.8.0
  supabase_flutter: ^2.12.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
    - assets/objects/models/helicopter/
    - assets/objects/models/jeep/
    - assets/objects/models/tank/
